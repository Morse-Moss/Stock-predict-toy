{% extends "layout.html" %}

{% block content %}
<script src="../static/js/echarts.js" charset='utf-8'></script>

<script type="text/javascript">
    // 初始化界面
    $(function () {
        $('#li_1').attr('class', 'nav-item');
        $('#li_2').attr('class', 'nav-item');
        $('#li_3').attr('class', 'nav-item');
        $('#li_4').attr('class', 'nav-item');
        $('#li_5').attr('class', 'nav-item');
        $('#li_6').attr('class', 'nav-item active');
        $('#li_7').attr('class', 'nav-item');
        $('#li_8').attr('class', 'nav-item');
        $('#li_9').attr('class', 'nav-item');
        $('#li_10').attr('class', 'nav-item');

        $('#module_name').text($('.nav-item.active').text())

        $.get('/api/market_eval_analysis/TTM', {},
            function (data) {
                var dom = document.getElementById("main1");
                var myChart = echarts.init(dom);
                
                var min = Math.min.apply(null, data['ttms']);
                var max = Math.max.apply(null, data['ttms']);

                var option = {
                    title: {
                        left: 'center',
                        text: '市场基本面之大盘市盈率TTM分布',
                    },
                    tooltip: {
                        trigger: 'axis'
                    },
                    grid: {
                        left: '5%',
                        right: '15%',
                        bottom: '10%'
                    },
                    xAxis: {
                        name: '日期',
                        data: data['dates']
                    },
                    yAxis: {
                        name: '市盈率 TTM',
                        min: (min * 0.9).toFixed(2),
                        max: (max * 1.1).toFixed(2)
                    },
                    toolbox: {
                        right: 10,
                        feature: {
                            dataZoom: {
                                yAxisIndex: 'none'
                            },
                            restore: {},
                            saveAsImage: {}
                        }
                    },
                    visualMap: {
                        top: 50,
                        right: 10,
                        pieces: [
                            {
                                gt: 0,
                                lte: data['eval_value_30_percentile'],
                                color: '#93CE07'
                            },
                            {
                                gt: data['eval_value_30_percentile'],
                                lte: data['eval_value_50_percentile'],
                                color: '#FBDB0F'
                            },
                            {
                                gt: data['eval_value_50_percentile'],
                                lte: data['eval_value_70_percentile'],
                                color: '#FC7D02'
                            },
                            {
                                gt: data['eval_value_70_percentile'],
                                lte: 100,
                                color: '#FD0100'
                            }
                        ],
                        outOfRange: {
                            color: '#999'
                        }
                    },
                    series: {
                        name: '市盈率 TTM',
                        type: 'line',
                        data: data['ttms'],
                        lineStyle: {
                            width: 3
                        },
                        markLine: {
                            silent: true,
                            lineStyle: {
                                color: '#333'
                            },
                            data: [
                                {
                                    name: '30分位值',
                                    yAxis: data['eval_value_30_percentile']
                                },
                                {
                                    yAxis: data['eval_value_50_percentile']
                                },
                                {
                                    yAxis: data['eval_value_70_percentile']
                                }
                            ]
                        }
                    }
                };

                if (option && typeof option === "object") {
                    myChart.setOption(option, true);
                }
            }
        );

        $.get('/api/market_eval_analysis/MRQ', {},
            function (data) {
                var dom = document.getElementById("main2");
                var myChart = echarts.init(dom);

                var min = Math.min.apply(null, data['ttms']);
                var max = Math.max.apply(null, data['ttms']);

                var option = {
                    title: {
                        left: 'center',
                        text: '市场基本面之大盘市净率 MRQ 分布',
                    },
                    tooltip: {
                        trigger: 'axis'
                    },
                    grid: {
                        left: '5%',
                        right: '15%',
                        bottom: '10%'
                    },
                    xAxis: {
                        name: '日期',
                        data: data['dates']
                    },
                    yAxis: {
                        name: '市净率 MRQ',
                        min: (min * 0.9).toFixed(2),
                        max: (max * 1.1).toFixed(2)
                    },
                    toolbox: {
                        right: 10,
                        feature: {
                            dataZoom: {
                                yAxisIndex: 'none'
                            },
                            restore: {},
                            saveAsImage: {}
                        }
                    },
                    visualMap: {
                        top: 50,
                        right: 10,
                        pieces: [
                            {
                                gt: 0,
                                lte: data['eval_value_30_percentile'],
                                color: '#93CE07'
                            },
                            {
                                gt: data['eval_value_30_percentile'],
                                lte: data['eval_value_50_percentile'],
                                color: '#FBDB0F'
                            },
                            {
                                gt: data['eval_value_50_percentile'],
                                lte: data['eval_value_70_percentile'],
                                color: '#FC7D02'
                            },
                            {
                                gt: data['eval_value_70_percentile'],
                                lte: 100,
                                color: '#FD0100'
                            }
                        ],
                        outOfRange: {
                            color: '#999'
                        }
                    },
                    series: {
                        name: '市净率 MRQ',
                        type: 'line',
                        data: data['ttms'],
                        lineStyle: {
                            width: 3
                        },
                        markLine: {
                            silent: true,
                            lineStyle: {
                                color: '#333'
                            },
                            data: [
                                {
                                    name: '30分位值',
                                    yAxis: data['eval_value_30_percentile']
                                },
                                {
                                    yAxis: data['eval_value_50_percentile']
                                },
                                {
                                    yAxis: data['eval_value_70_percentile']
                                }
                            ]
                        }
                    }
                };

                if (option && typeof option === "object") {
                    myChart.setOption(option, true);
                }
            }
        );
    });
</script>

<div class="row" style="margin-top: 10px;">
    <h3 class="page-header" style="margin-top: 20px;">大盘市盈率 TTM 分布</h3>
    <div class="row placeholders">
        <div class="col-12" style="height:500px;" id="main1">
        </div>
    </div>

    <h3 class="page-header" style="margin-top: 20px;">大盘市净率 MRQ 分布</h3>
    <div class="row placeholders">
        <div class="col-12" style="height:500px;" id="main2">
        </div>
    </div>
</div>

{% endblock %}
