{% extends "layout.html" %}

{% block content %}
<script src="../static/js/echarts.js" charset='utf-8'></script>

<script type="text/javascript">
    // 初始化界面
    $(function () {
        $('#li_1').attr('class', 'nav-item');
        $('#li_2').attr('class', 'nav-item');
        $('#li_3').attr('class', 'nav-item');
        $('#li_4').attr('class', 'nav-item');
        $('#li_5').attr('class', 'nav-item');
        $('#li_6').attr('class', 'nav-item');
        $('#li_7').attr('class', 'nav-item');
        $('#li_8').attr('class', 'nav-item active');
        $('#li_9').attr('class', 'nav-item');

        $('#module_name').text($('.nav-item.active').text())

        $("#submit_search").click(function () {
            $("#add_select").empty();
            const search_input = $("#search_input").val();
            $.get('/api/stock_quant_analysis/' + search_input, {},
                function (data) {
                    var kline_data = data['kline_data']

                    var dom = document.getElementById("main1");
                    var myChart = echarts.init(dom);

                    var upColor = '#ec0000';
                    var upBorderColor = '#8A0000';
                    var downColor = '#00da3c';
                    var downBorderColor = '#008F28';

                    // 数据意义：开盘(open)，收盘(close)，最低(lowest)，最高(highest)
                    var data0 = splitData(kline_data);

                    function splitData(rawData) {
                        var categoryData = [];
                        var values = []
                        for (var i = 0; i < rawData.length; i++) {
                            categoryData.push(rawData[i].splice(0, 1)[0]);
                            values.push(rawData[i])
                        }
                        return {
                            categoryData: categoryData,
                            values: values
                        };
                    }

                    var option = {
                        tooltip: {
                            trigger: 'axis',
                            axisPointer: {
                                animation: false
                            }
                        },
                        legend: {
                            data: ['日K', 'BOLL-UPPER', 'BOLL-MIDDLE', 'BOLL-LOWER']
                        },
                        axisPointer: {
                            link: { xAxisIndex: 'all' }
                        },
                        grid: [{
                            left: 50,
                            right: 50,
                            height: '78%'
                        }],
                        xAxis: [{
                            gridIndex: 0,
                            type: 'category',
                            data: data0.categoryData,
                            scale: true,
                            boundaryGap: false,
                            axisLine: { onZero: false },
                            splitLine: { show: false },
                            splitNumber: 20,
                        }],
                        yAxis: [{
                            name: '股价',
                            scale: true,
                            gridIndex: 0,
                            splitArea: {
                                show: true
                            },
                        }],
                        series: [
                            {
                                name: '日K',
                                type: 'candlestick',
                                data: data0.values,
                                xAxisIndex: 0,
                                yAxisIndex: 0,
                                itemStyle: {
                                    color: upColor,
                                    color0: downColor,
                                    borderColor: upBorderColor,
                                    borderColor0: downBorderColor
                                },
                            },
                            {
                                name: 'BOLL-UPPER',
                                type: 'line',
                                data: data['boll_data']['UPPER'],
                                xAxisIndex: 0,
                                yAxisIndex: 0,
                                symbol: 'none',  //取消折点圆圈
                                smooth: true,
                                lineStyle: {
                                    opacity: 0.5
                                }
                            },
                            {
                                name: 'BOLL-MIDDLE',
                                type: 'line',
                                data: data['boll_data']['MIDDLE'],
                                xAxisIndex: 0,
                                yAxisIndex: 0,
                                symbol: 'none',  //取消折点圆圈
                                smooth: true,
                                lineStyle: {
                                    opacity: 0.5
                                }
                            },
                            {
                                name: 'BOLL-LOWER',
                                type: 'line',
                                data: data['boll_data']['LOWER'],
                                xAxisIndex: 0,
                                yAxisIndex: 0,
                                symbol: 'none',  //取消折点圆圈
                                smooth: true,
                                lineStyle: {
                                    opacity: 0.5
                                }
                            }
                        ]
                    };
                    if (option && typeof option === "object") {
                        myChart.setOption(option, true);
                    }

                    var dom = document.getElementById("main3");
                    var myChart = echarts.init(dom);
                    var option = {}
                    console.log(data)

                    option = {
                        title: {
                            text: '日收益率',
                            left: 0
                        },
                        tooltip: {
                            trigger: 'axis',
                            axisPointer: {
                                animation: false
                            }
                        },
                        axisPointer: {
                            link: { xAxisIndex: 'all' }
                        },
                        grid: [{
                            left: 50,
                            right: 50,
                            height: '78%'
                        }],
                        xAxis: [{
                            gridIndex: 0,
                            type: 'category',
                            data: data['date'],
                            scale: true,
                            boundaryGap: false,
                            axisLine: { onZero: false },
                            splitLine: { show: false },
                            splitNumber: 20,
                        }],
                        yAxis: {
                            type: 'value'
                        },
                        series: {
                            name: '日收益率',
                            data: data['日收益率'],
                            type: 'line',
                            smooth: true
                        }
                    };
                    if (option && typeof option === "object") {
                        myChart.setOption(option, true);
                    }

                    var dom = document.getElementById("main4");
                    var myChart = echarts.init(dom);
                    var option = {}
                    console.log(data)

                    option = {
                        title: {
                            text: '累计收益率',
                            left: 0
                        },
                        tooltip: {
                            trigger: 'axis',
                            axisPointer: {
                                animation: false
                            }
                        },
                        axisPointer: {
                            link: { xAxisIndex: 'all' }
                        },
                        grid: [{
                            left: 50,
                            right: 50,
                            height: '78%'
                        }],
                        xAxis: [{
                            gridIndex: 0,
                            type: 'category',
                            data: data['date'],
                            scale: true,
                            boundaryGap: false,
                            axisLine: { onZero: false },
                            splitLine: { show: false },
                            splitNumber: 20,
                        }],
                        yAxis: {
                            type: 'value'
                        },
                        series: {
                            name: '累计收益率',
                            data: data['累计收益率'],
                            type: 'line',
                            smooth: true
                        }
                    };
                    if (option && typeof option === "object") {
                        myChart.setOption(option, true);
                    }
                }
            );

        });

    });
</script>

<div class="" style="margin-top: 10px;">
    <div style="margin-top: 50px;">
        <div class="container">
            <div class="col-md-6 ms-auto me-auto">
                <div class="input-group mb-3">
                    <input type="text" class="form-control" id="search_input" placeholder="请输入股票名称、代码"
                        aria-describedby="button-addon2">
                    <button class="btn btn-success" type="button" id="submit_search">提交分析</button>
                </div>
            </div>
        </div>

        <div class="row" style="margin-top: 10px;">
            <div class="col-xs-12">
                <div id="add_select">
                </div>

                <div class="row placeholders" style="margin-top: 20px;">
                    <div class="col-xs-12 " style="height:400px;" id="main1"></div>
                </div>

                <div class="row placeholders" style="margin-top: 20px;">
                    <div class="col-xs-12 " style="height:200px;" id="main3"></div>
                </div>
                <div class="row placeholders" style="margin-top: 20px;">
                    <div class="col-xs-12 " style="height:400px;" id="main4"></div>
                </div>

                <div class="row placeholders" style="margin-top: 20px; margin-left: 20px; margin-right: 20px;"
                    id="gsjj">
                </div>
            </div>
        </div>
    </div>

</div>

{% endblock %}
